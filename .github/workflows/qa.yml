name: QA

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-qa:
    name: Static QA
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run static QA
        run: npm run qa

  smoke:
    name: Smoke / ${{ matrix.name }}
    needs: static-qa
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      PLAYWRIGHT_BROWSERS_PATH: /tmp/yow-ms-playwright
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: launch
            spec: tests/e2e/launch-smoke.spec.js
          - name: project-types
            spec: tests/e2e/project-types.spec.js
          - name: export-formats
            spec: tests/e2e/export-formats.spec.js
          - name: responsive
            spec: tests/e2e/responsive-smoke.spec.js

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run ${{ matrix.name }} smoke tests
        run: npx playwright test --config playwright.config.mjs ${{ matrix.spec }}

      - name: Upload smoke test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ matrix.name }}-artifacts
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7
