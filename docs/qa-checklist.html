<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOW QA Checklist</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --accent: #a78bfa;
    --accent2: #7c3aed;
    --green: #34d399;
    --yellow: #fbbf24;
    --red: #f87171;
    --text: #e2e2f0;
    --muted: #7a7a9a;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
  }

  /* Header */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    flex: 1;
    min-width: 200px;
  }
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--muted);
  }
  .progress-bar {
    width: 180px;
    height: 6px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 999px;
    transition: width 0.3s ease;
    width: 0%;
  }
  .header-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  button {
    cursor: pointer;
    border: none;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    padding: 7px 14px;
    transition: opacity 0.15s, background 0.15s;
  }
  button:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent2); color: #fff; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: #3d1f1f; color: var(--red); border: 1px solid #5a2a2a; }

  /* Search / Filter bar */
  .toolbar {
    padding: 10px 24px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .search-input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 7px 12px;
    font-size: 13px;
    width: 260px;
    outline: none;
  }
  .search-input:focus { border-color: var(--accent); }
  .filter-btn {
    padding: 6px 12px;
    font-size: 12px;
    border-radius: 999px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .filter-btn.active { background: var(--accent2); color: #fff; border-color: var(--accent2); }

  /* Main layout */
  .main {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px;
  }

  /* Section */
  .section {
    margin-bottom: 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .section-header:hover { background: #2a2a38; }
  .section-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
  }
  .section-num {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    background: var(--border);
    padding: 2px 8px;
    border-radius: 999px;
    min-width: 36px;
    text-align: center;
  }
  .section-num.all-done { background: #1a3d2e; color: var(--green); }
  .collapse-icon {
    color: var(--muted);
    font-size: 12px;
    transition: transform 0.2s;
  }
  .section.collapsed .collapse-icon { transform: rotate(-90deg); }
  .section-body { padding: 6px 0; }
  .section.collapsed .section-body { display: none; }

  /* Subsection label */
  .subsection-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    padding: 10px 18px 4px;
  }

  /* Checklist item */
  .item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 18px;
    border-radius: 6px;
    margin: 0 6px;
    transition: background 0.1s;
  }
  .item:hover { background: var(--surface2); }
  .item.hidden { display: none; }
  .item.checked { opacity: 0.5; }
  .item.checked .item-label { text-decoration: line-through; color: var(--muted); }
  .item.failed {
    background: #261111;
    border: 1px solid #5a2a2a;
  }
  .item.failed:hover { background: #321515; }
  .item.failed .item-label { color: #fecaca; }
  .item.skipped {
    background: #171722;
    border: 1px dashed #3d3d52;
  }

  .item-right {
    flex: 1;
    min-width: 0;
  }
  .item-label {
    font-size: 13.5px;
    color: var(--text);
    line-height: 1.45;
  }
  .item-label .tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 4px;
    margin-right: 5px;
    vertical-align: middle;
    text-transform: uppercase;
  }
  .tag.blocker { background: #3d1f1f; color: var(--red); }
  .tag.regression { background: #1f2e1a; color: var(--green); }

  .note-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
  }
  .note-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 12px;
    padding: 5px 9px;
    resize: none;
    overflow: hidden;
    height: 28px;
    transition: border-color 0.15s, color 0.15s, height 0.1s;
    font-family: inherit;
    outline: none;
    line-height: 1.4;
  }
  .note-input:focus {
    border-color: var(--accent);
    color: var(--text);
    height: 56px;
  }
  .note-input::placeholder { color: var(--border); }
  .note-input.has-note {
    color: var(--yellow);
    border-color: #3a3000;
    background: #1e1b00;
  }

  .status-checks {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }
  .status-check {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    min-height: 28px;
    padding: 4px 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 11px;
    cursor: pointer;
    user-select: none;
  }
  .status-check:hover { border-color: #4b4b63; }
  .status-check input {
    width: 13px;
    height: 13px;
    accent-color: var(--accent2);
    cursor: pointer;
  }
  .status-check.pass.active {
    background: #123326;
    border-color: #1f6b4d;
    color: var(--green);
  }
  .status-check.fail.active {
    background: #3d1f1f;
    border-color: #7f1d1d;
    color: var(--red);
  }
  .status-check.skip.active {
    background: #2e2e3e;
    border-color: #55556d;
    color: #c7c7da;
  }
  .status-bucket-label {
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text);
    padding: 14px 18px 5px;
    margin-top: 6px;
    border-top: 1px solid var(--border);
  }
  .status-bucket-label.second-pass { color: var(--yellow); }
  .status-bucket-label.passed { color: var(--green); }

  /* Export modal */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 100%;
    max-width: 640px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
  }
  .modal-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .modal-header h2 { font-size: 15px; flex: 1; }
  .modal-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
  }
  .modal-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }
  .export-options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
  }
  .export-option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .export-option:hover { border-color: var(--accent); }
  .export-option input[type=radio] { accent-color: var(--accent2); }
  .export-option label { cursor: pointer; }
  .export-option label strong { display: block; color: var(--text); font-size: 13px; }
  .export-option label span { font-size: 12px; color: var(--muted); }
  .export-scope {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .export-scope label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
  }
  .export-scope input[type=checkbox] { accent-color: var(--accent2); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 600px) {
    .header { padding: 10px 14px; }
    .main { padding: 14px; }
    .progress-bar { width: 120px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>YOW QA Checklist</h1>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <span id="progressText">0 / 0</span>
  </div>
  <div class="header-actions">
    <button class="btn-secondary" onclick="collapseAll()">Collapse All</button>
    <button class="btn-secondary" onclick="expandAll()">Expand All</button>
    <button class="btn-primary" onclick="openExportModal()">Export Notes</button>
    <button class="btn-danger" onclick="confirmReset()">Reset All</button>
  </div>
</div>

<div class="toolbar">
  <input class="search-input" type="text" id="searchInput" placeholder="Search checklist items…" oninput="applyFilters()">
  <button class="filter-btn active" id="filter-all" onclick="setFilter('all')">All</button>
  <button class="filter-btn" id="filter-unchecked" onclick="setFilter('unchecked')">Unchecked</button>
  <button class="filter-btn" id="filter-checked" onclick="setFilter('checked')">Checked</button>
  <button class="filter-btn" id="filter-notes" onclick="setFilter('notes')">Has Notes</button>
  <button class="filter-btn" id="filter-fail" onclick="setFilter('fail')">Failed</button>
</div>

<div class="main" id="main"></div>

<!-- Export Modal -->
<div class="modal-backdrop" id="exportModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Export Notes</h2>
      <button class="btn-secondary" onclick="closeExportModal()" style="padding:4px 10px;">✕</button>
    </div>
    <div class="modal-body">
      <div class="export-options">
        <div class="export-option">
          <input type="radio" name="exportFmt" id="fmtMarkdown" value="markdown" checked>
          <label for="fmtMarkdown">
            <strong>Markdown (.md)</strong>
            <span>Sections, checkboxes, statuses, and notes in GitHub-flavoured Markdown</span>
          </label>
        </div>
        <div class="export-option">
          <input type="radio" name="exportFmt" id="fmtHtml" value="html">
          <label for="fmtHtml">
            <strong>HTML Report</strong>
            <span>Standalone readable HTML file with full checklist and notes</span>
          </label>
        </div>
        <div class="export-option">
          <input type="radio" name="exportFmt" id="fmtJson" value="json">
          <label for="fmtJson">
            <strong>JSON</strong>
            <span>Raw data — useful for re-importing or further processing</span>
          </label>
        </div>
        <div class="export-option">
          <input type="radio" name="exportFmt" id="fmtCsv" value="csv">
          <label for="fmtCsv">
            <strong>CSV</strong>
            <span>Spreadsheet-ready: section, item, checked, status, note columns</span>
          </label>
        </div>
      </div>
      <div class="export-scope">
        <strong style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;">Include</strong>
        <label><input type="checkbox" id="inclChecked" checked> Checked items</label>
        <label><input type="checkbox" id="inclUnchecked" checked> Unchecked items</label>
        <label><input type="checkbox" id="inclNoNote"> Only items with notes or non-default status</label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeExportModal()">Cancel</button>
      <button class="btn-primary" onclick="runExport()">Download</button>
    </div>
  </div>
</div>

// ─── STATE ─────────────────────────────────────────────────────────────────

const STATE_KEY = 'yow_qa_v1';
const COLLAPSED_KEY = 'yow_qa_collapsed_v1';
let state = {};
let collapsedSections = {};

function loadState() {
  try { state = JSON.parse(localStorage.getItem(STATE_KEY)) || {}; } catch { state = {}; }
  try { collapsedSections = JSON.parse(localStorage.getItem(COLLAPSED_KEY)) || {}; } catch { collapsedSections = {}; }
}
function saveState() {
  localStorage.setItem(STATE_KEY, JSON.stringify(state));
}
function saveCollapsedSections() {
  localStorage.setItem(COLLAPSED_KEY, JSON.stringify(collapsedSections));
}
function getItem(id) {
  const item = state[id] || { checked: false, status: 'none', note: '' };
  if (item.checked && (!item.status || item.status === 'none')) {
    return { ...item, status: 'pass' };
  }
  return item;
}
function setItem(id, patch) {
  state[id] = { ...getItem(id), ...patch };
  saveState();
}

// ─── RENDER ────────────────────────────────────────────────────────────────

function render() {
  loadState();
  const main = document.getElementById('main');
  main.innerHTML = '';

  SECTIONS.forEach(sec => {
    const div = document.createElement('div');
    div.className = `section ${collapsedSections[sec.id] ? 'collapsed' : ''}`;
    div.id = sec.id;

    const realItems = sec.items.filter(i => i.id);
    const checkedCount = realItems.filter(i => getItem(i.id).checked).length;
    const allDone = realItems.length > 0 && checkedCount === realItems.length;

    div.innerHTML = `
      <div class="section-header" onclick="toggleSection('${sec.id}')">
        <span class="section-title">${sec.title}</span>
        <span class="section-num ${allDone ? 'all-done' : ''}">${checkedCount}/${realItems.length}</span>
        <span class="collapse-icon">▾</span>
      </div>
      <div class="section-body"></div>
    `;

    const body = div.querySelector('.section-body');

    appendItemGroup(body, sec.items, item => {
      const status = getItem(item.id).status || 'none';
      return status !== 'pass' && status !== 'skip';
    });

    if (sec.items.some(item => item.id && getItem(item.id).status === 'skip')) {
      appendBucketLabel(body, 'QA 2nd Pass', 'second-pass');
      appendItemGroup(body, sec.items, item => (getItem(item.id).status || 'none') === 'skip');
    }

    if (sec.items.some(item => item.id && getItem(item.id).status === 'pass')) {
      appendBucketLabel(body, 'Passed / Crossed Off', 'passed');
      appendItemGroup(body, sec.items, item => (getItem(item.id).status || 'none') === 'pass');
    }

    main.appendChild(div);
  });

  updateProgress();
  applyFilters();
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function appendBucketLabel(body, text, type) {
  const label = document.createElement('div');
  label.className = `status-bucket-label ${type}`;
  label.textContent = text;
  body.appendChild(label);
}

function appendItemGroup(body, items, includeItem) {
  let pendingSub = '';

  items.forEach(item => {
    if (item.sub) {
      pendingSub = item.sub;
      return;
    }
    if (!item.id || !includeItem(item)) return;

    if (pendingSub) {
      const label = document.createElement('div');
      label.className = 'subsection-label';
      label.textContent = pendingSub;
      body.appendChild(label);
      pendingSub = '';
    }

    body.appendChild(createItemRow(item));
  });
}

function createItemRow(item) {
  const s = getItem(item.id);
  const status = s.status || 'none';
  const row = document.createElement('div');
  row.className = `item ${s.checked ? 'checked' : ''} ${status === 'fail' ? 'failed' : ''} ${status === 'skip' ? 'skipped' : ''}`;
  row.dataset.id = item.id;
  row.dataset.label = item.label.toLowerCase();
  row.dataset.checked = s.checked ? 'true' : 'false';
  row.dataset.note = s.note || '';
  row.dataset.status = status;

  const tagHtml = (item.tags || []).map(t =>
    `<span class="tag ${t}">${t}</span>`
  ).join('');

  row.innerHTML = `
    <div class="item-right">
      <div class="item-label">${tagHtml}${escHtml(item.label)}</div>
      <div class="note-row">
        <div class="status-checks" role="group" aria-label="Current status">
          ${statusCheckbox(item.id, status, 'pass', 'Pass')}
          ${statusCheckbox(item.id, status, 'fail', 'Fail')}
          ${statusCheckbox(item.id, status, 'skip', 'Skip')}
        </div>
        <textarea class="note-input ${s.note ? 'has-note' : ''}" placeholder="Add a note..." oninput="updateNote('${item.id}', this)" onblur="shrinkNote(this)">${escHtml(s.note || '')}</textarea>
      </div>
    </div>
  `;

  return row;
}

function statusCheckbox(id, currentStatus, status, label) {
  const checked = currentStatus === status;
  return `
    <label class="status-check ${status} ${checked ? 'active' : ''}">
      <input type="checkbox" ${checked ? 'checked' : ''} onchange="changeStatus('${id}', '${status}', this)">
      <span>${label}</span>
    </label>
  `;
}

// ─── INTERACTIONS ──────────────────────────────────────────────────────────

function toggleSection(id) {
  const section = document.getElementById(id);
  const collapsed = section.classList.toggle('collapsed');
  collapsedSections[id] = collapsed;
  saveCollapsedSections();
}
function collapseAll() {
  SECTIONS.forEach(s => {
    collapsedSections[s.id] = true;
    document.getElementById(s.id).classList.add('collapsed');
  });
  saveCollapsedSections();
}
function expandAll() {
  SECTIONS.forEach(s => {
    collapsedSections[s.id] = false;
    document.getElementById(s.id).classList.remove('collapsed');
  });
  saveCollapsedSections();
}

function changeStatus(id, status, el) {
  const nextStatus = el.checked ? status : 'none';
  setItem(id, {
    status: nextStatus,
    checked: nextStatus === 'pass'
  });
  render();
}

function updateNote(id, el) {
  const val = el.value;
  setItem(id, { note: val });
  el.classList.toggle('has-note', !!val.trim());
  el.closest('.item').dataset.note = val;
  // auto-grow
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

function shrinkNote(el) {
  if (!el.value.trim()) el.style.height = '';
}

function updateProgress() {
  const allItems = document.querySelectorAll('.item');
  const checkedItems = document.querySelectorAll('.item.checked');
  const pct = allItems.length ? (checkedItems.length / allItems.length) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${checkedItems.length} / ${allItems.length}`;
}

// ─── FILTER ────────────────────────────────────────────────────────────────

let currentFilter = 'all';

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('filter-' + f).classList.add('active');
  applyFilters();
}

function applyFilters() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  document.querySelectorAll('.item').forEach(row => {
    const label = row.dataset.label || '';
    const checked = row.dataset.checked === 'true';
    const note = (row.dataset.note || '').toLowerCase();
    const status = row.dataset.status || 'none';

    let show = true;
    if (query && !label.includes(query) && !note.includes(query)) show = false;
    if (currentFilter === 'unchecked' && checked) show = false;
    if (currentFilter === 'checked' && !checked) show = false;
    if (currentFilter === 'notes' && !note.trim()) show = false;
    if (currentFilter === 'fail' && status !== 'fail') show = false;

    row.classList.toggle('hidden', !show);
  });

  // hide group labels until at least one visible item underneath needs them
  document.querySelectorAll('.section-body').forEach(body => {
    const nodes = Array.from(body.children);
    nodes.forEach(node => {
      if (node.classList.contains('subsection-label') || node.classList.contains('status-bucket-label')) {
        node.style.display = 'none';
      }
    });

    nodes.forEach((node, i) => {
      if (!node.classList.contains('item') || node.classList.contains('hidden')) return;

      for (let j = i - 1; j >= 0; j--) {
        const prev = nodes[j];
        if (prev.classList.contains('item')) break;
        if (prev.classList.contains('subsection-label') || prev.classList.contains('status-bucket-label')) {
          prev.style.display = '';
        }
      }
    });
  });
}

// ─── RESET ─────────────────────────────────────────────────────────────────

function confirmReset() {
  if (confirm('Reset all checkboxes, statuses, and notes? This cannot be undone.')) {
    state = {};
    saveState();
    render();
  }
}

// ─── EXPORT ────────────────────────────────────────────────────────────────

function openExportModal()  { document.getElementById('exportModal').classList.add('open'); }
function closeExportModal() { document.getElementById('exportModal').classList.remove('open'); }

document.getElementById('exportModal').addEventListener('click', function(e) {
  if (e.target === this) closeExportModal();
});

function collectData() {
  const inclChecked   = document.getElementById('inclChecked').checked;
  const inclUnchecked = document.getElementById('inclUnchecked').checked;
  const onlyNoted     = document.getElementById('inclNoNote').checked;

  const rows = [];
  SECTIONS.forEach(sec => {
    sec.items.forEach(item => {
      if (!item.id) return;
      const s = getItem(item.id);
      if (!inclChecked && s.checked) return;
      if (!inclUnchecked && !s.checked) return;
      if (onlyNoted && !s.note.trim() && s.status === 'none') return;
      rows.push({ section: sec.title, label: item.label, checked: s.checked, status: s.status, note: s.note, tags: item.tags || [] });
    });
  });
  return rows;
}

function runExport() {
  const fmt = document.querySelector('input[name=exportFmt]:checked').value;
  const rows = collectData();
  const ts = new Date().toISOString().slice(0,16).replace('T','_').replace(':','-');

  if (fmt === 'json') {
    download(`yow-qa-${ts}.json`, JSON.stringify(rows, null, 2), 'application/json');
  } else if (fmt === 'csv') {
    const header = ['Section','Item','Checked','Status','Note'];
    const lines = [header.join(','), ...rows.map(r => [
      csvCell(r.section), csvCell(r.label), r.checked ? 'TRUE' : 'FALSE', r.status, csvCell(r.note)
    ].join(','))];
    download(`yow-qa-${ts}.csv`, lines.join('\n'), 'text/csv');
  } else if (fmt === 'markdown') {
    let md = `# YOW QA Checklist Export\n_Generated: ${new Date().toLocaleString()}_\n\n`;
    let lastSec = '';
    rows.forEach(r => {
      if (r.section !== lastSec) { md += `\n## ${r.section}\n\n`; lastSec = r.section; }
      const cb = r.checked ? '[x]' : '[ ]';
      const st = r.status !== 'none' ? ` \`${r.status.toUpperCase()}\`` : '';
      md += `- ${cb}${st} ${r.label}\n`;
      if (r.note.trim()) md += `  > **Note:** ${r.note.trim()}\n`;
    });
    download(`yow-qa-${ts}.md`, md, 'text/markdown');
  } else if (fmt === 'html') {
    let sections = {};
    rows.forEach(r => {
      if (!sections[r.section]) sections[r.section] = [];
      sections[r.section].push(r);
    });
    const total = rows.length;
    const done  = rows.filter(r => r.checked).length;
    const failed = rows.filter(r => r.status === 'fail').length;

    let body = '';
    for (const [sec, items] of Object.entries(sections)) {
      body += `<h2>${esc(sec)}</h2><ul>`;
      items.forEach(r => {
        const st = r.status !== 'none' ? ` <span class="st ${r.status}">${r.status.toUpperCase()}</span>` : '';
        body += `<li class="${r.checked ? 'done' : ''}${r.status === 'fail' ? ' fail' : ''}">
          <span class="cb">${r.checked ? '✓' : '○'}</span>${st} ${esc(r.label)}
          ${r.note.trim() ? `<div class="note">${esc(r.note)}</div>` : ''}
        </li>`;
      });
      body += `</ul>`;
    }

    const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>YOW QA Report</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f13;color:#e2e2f0;max-width:860px;margin:0 auto;padding:32px;font-size:14px;}
h1{color:#a78bfa;margin-bottom:4px;} .meta{color:#7a7a9a;font-size:13px;margin-bottom:32px;}
h2{color:#c4b5fd;border-bottom:1px solid #2e2e3e;padding-bottom:8px;margin-top:32px;}
ul{list-style:none;padding:0;} li{padding:7px 10px;border-radius:6px;margin:2px 0;line-height:1.5;}
li:hover{background:#1a1a22;} li.done{opacity:.55;text-decoration:line-through;}
li.fail{background:#1f0f0f;} .cb{margin-right:8px;color:#7a7a9a;}
li.done .cb{color:#34d399;} .note{margin-top:5px;padding:6px 10px;background:#1a1a00;border-left:3px solid #fbbf24;color:#fbbf24;border-radius:4px;font-size:12px;text-decoration:none;}
.st{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;margin-right:4px;}
.st.pass{background:#1a3d2e;color:#34d399;} .st.fail{background:#3d1f1f;color:#f87171;} .st.skip{background:#2e2e3e;color:#7a7a9a;}
.summary{display:flex;gap:24px;margin-bottom:24px;} .stat{background:#1a1a22;padding:12px 18px;border-radius:8px;border:1px solid #2e2e3e;}
.stat .n{font-size:28px;font-weight:700;color:#a78bfa;} .stat .l{font-size:12px;color:#7a7a9a;}
</style></head><body>
<h1>YOW QA Report</h1><div class="meta">Generated: ${new Date().toLocaleString()}</div>
<div class="summary">
  <div class="stat"><div class="n">${done}/${total}</div><div class="l">Checked</div></div>
  <div class="stat"><div class="n">${Math.round(done/total*100)||0}%</div><div class="l">Complete</div></div>
  <div class="stat"><div class="n" style="color:#f87171">${failed}</div><div class="l">Failed</div></div>
</div>
${body}
</body></html>`;
    download(`yow-qa-report-${ts}.html`, html, 'text/html');
  }

  closeExportModal();
}

function csvCell(v) { return '"' + String(v||'').replace(/"/g,'""') + '"'; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function download(filename, content, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type: mime }));
  a.download = filename;
  a.click();
}

// ─── INIT ──────────────────────────────────────────────────────────────────

render();
</script>
</body>
</html>
